# 프로젝트 적응형 설정 (차별점 B의 1차 — 항목을 의도적으로 소수로 제한)
# 프로젝트가 바뀌면 이 파일만 교체하면 된다.

# 생성 코드 루트 패키지
basePackage=codegen.sample.test.pro

# URL/뷰/Mapper 경로 세그먼트
module=sample/test/pro

# Mapper XML / JSP 출력 루트 — 프로젝트의 eGov 스캔 경로에 맞춰 바꾼다(기본값은 표준 eGov).
#  예) Mapper 스캔이 egovframework/sqlmap 이면 mapperRoot 를 그 값으로.
mapperRoot=egovframework/mapper
jspRoot=WEB-INF/jsp

# 엔티티명 도출 시 제거할 테이블 prefix
tablePrefix=

# 대상 DB (1차 mysql만 지원)
dbType=mysql

# (선택) 접속 기본 URL — 생성 끝에 안내되는 URL의 앞부분. 톰캣 포트/컨텍스트에 맞게.
#  예: http://localhost:8080  또는  http://localhost:8080/{projectNm}
baseUrl=http://localhost:8080

# 산출물 출력 루트
outputDir=./output

# 공통 컴포넌트 베이스 경로 (eGov 5.0.1 검증값). 다른 버전이면 여기만 교체.
daoBase=org.egovframe.rte.psl.dataaccess.EgovAbstractMapper
serviceBase=org.egovframe.rte.fdl.cmmn.EgovAbstractServiceImpl
paginationInfo=org.egovframe.rte.ptl.mvc.tags.ui.pagination.PaginationInfo
